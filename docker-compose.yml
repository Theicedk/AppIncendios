version: "3.9"

services:
  postgres-reportes:
    image: postgres:15
    container_name: ms-reportes-db
    environment:
      POSTGRES_DB: bd_reportes
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5431:5432"
    volumes:
      - postgres_reportes_data:/var/lib/postgresql/data

  postgres-alarmas:
    image: postgres:15
    container_name: ms-alarmas-db
    environment:
      POSTGRES_DB: bd_alarmas
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5433:5432"
    volumes:
      - postgres_alarmas_data:/var/lib/postgresql/data

  postgres-geo:
    image: postgis/postgis:15-3.3
    container_name: ms-geo-db
    environment:
      POSTGRES_DB: bd_geolocalizacion
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5434:5432"
    volumes:
      - postgres_geo_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: appincendios-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: appincendios-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_reportes_data:
  postgres_alarmas_data:
  postgres_geo_data: